{% extends 'header.html' %}
{% load static %}

{% block sepr_css %}
<link rel="stylesheet" href="{% static 'styles/index.css' %}">
{% endblock %}

{% block content %}
<main style="padding: var(--sp-xl);">
    <h1 class="section-heading" style="text-align: center; margin-bottom: var(--sp-lg);">Browse by <span>Category</span>
    </h1>
    <section class="featured">
        <div class="movies">
            {% for c in ca %}
            <div class="movie">
                <a href="{{c.a}}">
                    <img src="{% static 'images/'|add:c.img %}" alt="{{c.name}}">
                </a>
                <h2>{{c.name}}</h2>
            </div>
            {% endfor %}
        </div>
    </section>
</main>
{% endblock %}
