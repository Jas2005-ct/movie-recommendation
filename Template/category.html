{% extends 'header.html' %}
{% load static %}

{% block sepr_css %}
<link rel="stylesheet" href="{% static 'styles/index.css' %}">
{% endblock %}

{% block content %}
<main class="container">
    <div class="section-header">
        <h2 class="section-heading">Browse by <span>Category</span></h2>
    </div>

    <div class="movies-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
        {% for c in ca %}
        <div class="movie-card"
            style="height: 180px; position: relative; overflow: hidden; justify-content: flex-end; padding: var(--sp-lg); border: 1px solid var(--clr-border-dim); border-radius: var(--r-md);">
            
            {% if c.poster %}
            <!-- Background Image -->
            <img src="{% static c.poster %}" alt="{{ c.title }}" class="poster-img"
                style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: transform var(--dur-slow) var(--ease-smooth);">
            {% endif %}
                
            <!-- Dark Overlay for Readability -->
            <div class="card-overlay" 
                style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(8, 12, 20, 0.9) 0%, rgba(8, 12, 20, 0.3) 100%); z-index: 2;"></div>
            
            <a href="{% url 'movie_list_category' category=c.category_id %}" class="poster-link"
                style="position: absolute; inset: 0; z-index: 10;"></a>
            
            <!-- Content -->
            <div class="card-content" style="position: relative; z-index: 5;">
                <h3
                    style="margin: 0 0 4px 0; font-family: var(--font-display); font-size: 1.8rem; text-shadow: 0 4px 12px rgba(0,0,0,0.5); color: var(--clr-accent);">
                    {{ c.title }}</h3>
                <p style="margin: 0; font-size: 0.95rem; color: var(--clr-text-muted); font-weight: 500;">
                    {{ c.desc }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</main>
{% endblock %}
