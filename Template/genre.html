{% extends 'header.html' %}
{% load static %}

{% block content %}
{% block sepr_css %}
<link rel="stylesheet" href="{% static 'styles/index.css' %}">
{% endblock %}

<main class="container">
    <div class="section-header">
        <h2 class="section-heading">Browse <span>Genres</span></h2>
    </div>

    <!-- TMDB doesn't provide images for genres directly, so we map them to a stylistic representation -->
    <div class="movies-grid" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
        {% for c in cat %}
        <div class="movie-card"
            style="height: 140px; justify-content: flex-end; padding: var(--sp-lg); background: linear-gradient(135deg, rgba(8, 12, 20, 0.9) 0%, rgba(232, 184, 75, 0.15) 100%);">
            <a href="#" class="poster-link" style="position: absolute; inset: 0; z-index: 10;"></a>
            <h3
                style="margin: 0; font-family: var(--font-display); font-size: 1.5rem; text-shadow: 0 4px 12px rgba(0,0,0,0.5);">
                {{ c.genre }}</h3>
        </div>
        {% endfor %}
    </div>
</main>
{% endblock %}
