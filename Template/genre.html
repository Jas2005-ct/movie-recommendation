{% extends 'header.html' %}
{% load static %}
{% static "images" as baseUrl %}

{% block sepr_css %}
<link rel="stylesheet" href="{% static 'styles/cate.css' %}">
{% endblock %}

{% block sear %}
<form method="get" action="{% url 'emotion_based_search' %}"
    style="display: flex; align-items: center; gap: 0; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--clr-border-dim); border-radius: var(--r-md); overflow: hidden;">
    <input class="tex" type="text" id="emotion" name="emotion" placeholder="How are you feeling today?"
        style="background: transparent; border: none; outline: none; padding: 9px 16px; font-size: 0.88rem; font-family: var(--font-body); color: var(--clr-text); width: 220px;">
    <button class="sea" type="submit"
        style="flex-shrink: 0; padding: 9px 18px; background: linear-gradient(135deg, var(--clr-accent) 0%, var(--clr-accent-dim) 100%); border: none; color: #0d1525; font-size: 0.82rem; font-weight: 700; cursor: pointer;">Find
        Movies</button>
</form>
{% endblock %}

{% block content %}
<main style="padding: var(--sp-xl);">
    <section class="featured">
        <div class="movies">
            {% for c in cat %}
            <div class="movie">
                <a href="{% url 'genre_movies' genre_id=c.genre_id%}">
                    <img src="{{c.img.url}}">
                </a>
                <h2>{{c.genre}} </h2>

            </div>
            {% endfor %}
        </div>
    </section>
</main>
{% endblock %}
