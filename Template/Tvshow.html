{% extends 'header.html' %}
{% load static %}

{% block content %}
{% block sepr_css %}
<link rel="stylesheet" href="{% static 'styles/index.css' %}">
{% endblock %}

<main class="container">
    <div class="section-header">
        <h2 class="section-heading">Featured <span>TV Shows</span></h2>
        <form class="srt" method="GET" action="{% url 'show' %}">
            <select name="sort" onchange="this.form.submit()" class="glass-select">
                <option value="">Sort By</option>
                <option value="year">Release Year</option>
                <option value="az">Highest Rated</option>
            </select>
        </form>
    </div>

    <div class="movies-grid">
        {% for tits in sh %}
        <div class="movie-card">
            <!-- No distinct tv detail page yet so linking to missing details url but mapped to a hash to avoid 500 error -->
            <a href="#" class="poster-link">
                <div class="poster-wrapper">
                    {% if tits.poster %}
                    <img src="{{tits.poster}}" alt="{{tits.name}}" loading="lazy">
                    {% else %}
                    <img src="https://via.placeholder.com/500x750?text=No+Poster" alt="No Poster">
                    {% endif %}
                    <div class="overlay-glass">
                        <span class="view-text">Featured</span>
                    </div>
                </div>
            </a>
            <div class="card-info">
                <h3>{{tits.name}}</h3>
                <div class="meta">
                    <span class="rate">★ {{tits.rate}}</span>
                    <span class="year">{{tits.year_f}}</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</main>
{% endblock %}
