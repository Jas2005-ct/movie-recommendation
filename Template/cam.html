{% extends 'header.html' %}
{% load static %}

{% block sepr_css %}
<link rel="stylesheet" href="{% static 'styles/came.css' %}">
{% endblock %}

{% block content %}
<div class="camera-page-wrapper" style="text-align: center; padding: 40px 20px;">
    <h1 class="section-heading" style="margin-bottom: 30px;">Capture Your <span>Emotion</span></h1>

    <div style="margin-bottom: 20px;">
        <button class='show' id="open-camera">Open Camera</button>
    </div>

    <div id="camera-container"
        style="display: none; margin: 0 auto; max-width: 500px; position: relative; margin-bottom: 30px;">
        <video id="camera-stream" autoplay></video>
        <div style="margin-top: 20px;">
            <button class='show' id="capture-btn">Capture</button>
        </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <div style="margin: 0 auto; padding-top: 20px;">
        <img id="captured-image"
            style="display: none; max-width: 300px; border-radius: var(--r-md); box-shadow: var(--shadow-card); margin: 0 auto 20px;" />
        <form id="image-form" method="POST" action="{% url 'capture_emotion' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" name="image_data" id="image-data">
            <button type="submit" class='show' id="submit-image" style="display: none; margin: 0 auto;">Detect
                Emotion</button>
        </form>
    </div>
</div>
<script>
    const openCameraBtn = document.getElementById("open-camera");
    const captureBtn = document.getElementById("capture-btn");
    const video = document.getElementById("camera-stream");
    const canvas = document.getElementById("canvas");
    const imageInput = document.getElementById("image-data");
    const capturedImage = document.getElementById("captured-image");
    const submitButton = document.getElementById("submit-image");

    let stream;

    openCameraBtn.addEventListener("click", async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: true
            });
            video.srcObject = stream;
            document.getElementById("camera-container").style.display = "block";
        } catch (error) {
            alert("Failed to access camera. Please check permissions.");
        }
    });

    captureBtn.addEventListener("click", () => {
        const context = canvas.getContext("2d");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL("image/png"); // Convert to Base64
        capturedImage.src = imageData;
        capturedImage.style.display = "block";
        imageInput.value = imageData; // Store image data in hidden input
        submitButton.style.display = "block";

        // Stop camera
        stream.getTracks().forEach(track => track.stop());
    });
</script>

{% endblock %}
