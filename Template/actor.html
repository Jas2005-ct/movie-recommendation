{% extends 'header.html' %}
{% load static %}

{% block sepr_css %}
<link rel="stylesheet" href="{% static 'styles/acts.css' %}">
{% endblock %}

{% block content %}
<main style="padding: var(--sp-xl);">
    <h1 class="section-heading" style="text-align: center; margin-bottom: var(--sp-lg);">Browse by <span>Actor</span>
    </h1>
    <section class="featured">
        <div class="movies">
            {% for a in acts %}
            <div class="movie">
                <a href="{% url 'acts_detail' actor_id=a.actor_id %}">
                    <img src="{% static 'images/'|add:a.img %}" alt="{{a.actor}}">
                </a>
                <h2>{{a.actor}}</h2>
            </div>
            {% endfor %}
        </div>
    </section>
</main>
{% endblock %}
</body>

</html>
